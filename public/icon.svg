<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer circle with gradient and rounded rect style for maskable compatibility -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Stylized Clock Graphic -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <circle r="140" fill="none" stroke="#0f172a" stroke-width="24" opacity="0.15" />
    <circle r="140" fill="none" stroke="#ffffff" stroke-width="20" />
    
    <!-- Hour marks -->
    <line x1="0" y1="-140" x2="0" y2="-120" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
    <line x1="140" y1="0" x2="120" y2="0" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
    <line x1="0" y1="140" x2="0" y2="120" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
    <line x1="-140" y1="0" x2="-120" y2="0" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
    
    <!-- Clock Hands -->
    <line x1="0" y1="0" x2="0" y2="-80" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />
    <line x1="0" y1="0" x2="60" y2="40" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />
    
    <!-- Center Pin -->
    <circle cx="0" cy="0" r="16" fill="#0f172a" />
    <circle cx="0" cy="0" r="8" fill="#ffffff" />
  </g>
  
  <!-- Glowing Sparkle Emojis in Corners -->
  <text x="75" y="125" font-size="55" fill="#ffffff" opacity="0.95">⚡</text>
  <text x="395" y="425" font-size="55" fill="#ffffff" opacity="0.95">🚀</text>
</svg>
